<template>
    <lightning-card title="Add New Property" icon-name="standard:home">
        <div class="slds-p-around_medium">

            <lightning-input label="Property Name" value={name}
                onchange={handleName} required></lightning-input>

            <lightning-input label="Address" value={address}
                onchange={handleAddress} required></lightning-input>

            <div class="slds-grid slds-gutters">
                <div class="slds-col">
                    <lightning-input label="City" value={city}
                        onchange={handleCity} required></lightning-input>
                </div>
                <div class="slds-col">
                    <lightning-input label="State" value={state}
                        onchange={handleState} required></lightning-input>
                </div>
            </div>

            <div class="slds-grid slds-gutters">
                <div class="slds-col">
                    <lightning-input label="Postal Code" value={postalCode}
                        onchange={handlePostalCode} required></lightning-input>
                </div>
                <div class="slds-col">
                    <lightning-input label="Country" value={country}
                        onchange={handleCountry} required></lightning-input>
                </div>
            </div>

            <lightning-combobox label="Type" value={type}
                options={typeOptions} onchange={handleType} required>
            </lightning-combobox>

            <lightning-combobox label="Furnishing Status" value={furnishingStatus}
                options={furnishingOptions} onchange={handleFurnishing}>
            </lightning-combobox>

            <lightning-combobox label="Status" value={status}
                options={statusOptions} onchange={handleStatus} required>
            </lightning-combobox>

            <lightning-input type="number" label="Rent (₹)" value={rent}
                onchange={handleRent} required></lightning-input>

            <lightning-textarea label="Description" value={description}
                onchange={handleDescription} required></lightning-textarea>

            <!-- Image Upload -->
            <div class="slds-m-top_medium">
                <label class="slds-form-element__label">
                    <abbr class="slds-required" title="required">*</abbr>
                    Property Images
                </label>
                <lightning-file-upload
                    label="Upload Property Images"
                    name="propertyImages"
                    accept={acceptedFormats}
                    record-id={recordId}
                    onuploadfinished={handleUploadFinished}
                    multiple>
                </lightning-file-upload>
                <template if:true={imageUploaded}>
                    <p class="slds-text-color_success slds-m-top_small">
                        ✅ {uploadedCount} image(s) uploaded successfully!
                    </p>
                </template>
            </div>

            <!-- Error Message -->
            <template if:true={errorMessage}>
                <p class="slds-text-color_error slds-m-top_small">
                    ⚠️ {errorMessage}
                </p>
            </template>

            <!-- Buttons -->
            <div class="slds-m-top_medium">
                <lightning-button
                    variant="brand"
                    label="Save Property"
                    onclick={handleSave}
                    class="slds-m-right_small">
                </lightning-button>
                <lightning-button
                    variant="neutral"
                    label="Clear Form"
                    onclick={handleClear}>
                </lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
